<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Inspirio Post</title>
    <link rel="stylesheet" href="../assets/brand.css" />
    <style>
      html, body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text-main);
        font-family: var(--font);
      }

      .wrapper {
        width: 1080px;
        height: 1080px;
        display: flex;
        flex-direction: column;
      }

      /* ── TOPBAR ──────────────────────────────────── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 48px 48px 0;
        flex-shrink: 0;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo img {
        width: 36px;
        height: 36px;
      }

      /* logo białe — używane na kolorowym tle */
      .logo img.white {
        filter: brightness(0) invert(1);
      }

      .logo-text {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: -0.5px;
      }

      .badge {
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 22px;
        font-weight: 600;
        padding: 10px 22px;
        border-radius: 50px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* ── CONTENT ─────────────────────────────────── */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 48px 80px;
        gap: 32px;
      }

      .headline {
        font-size: 88px;
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: -2px;
        color: var(--text-main);
      }

      .subheadline {
        font-size: 44px;
        font-weight: 500;
        line-height: 1.3;
        color: var(--text-muted);
        margin-top: -8px;
      }

      .body-points {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 16px;
      }

      .body-points li {
        font-size: 36px;
        font-weight: 400;
        line-height: 1.3;
        color: var(--text-main);
        display: flex;
        align-items: flex-start;
        gap: 20px;
      }

      .body-points li::before {
        content: '•';
        color: var(--accent);
        font-size: 44px;
        line-height: 1;
        flex-shrink: 0;
        margin-top: -2px;
      }

      /* ── DIVIDER ─────────────────────────────────── */
      .divider {
        height: 1px;
        background: var(--divider);
        margin: 0 48px;
        flex-shrink: 0;
      }

      /* ── BOTTOMBAR ───────────────────────────────── */
      .bottombar {
        background: var(--accent);
        padding: 28px 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .bottombar-cta {
        font-size: 26px;
        font-weight: 500;
        color: var(--text-main);
        opacity: 0.9;
      }

      .bottombar-date {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <div class="wrapper">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="logo">
          <img src="../assets/logo.svg" alt="Inspirio" />
          <span class="logo-text">Inspirio</span>
        </div>
        <span id="postType" class="badge">PORADA</span>
      </header>

      <!-- TREŚĆ -->
      <main class="content">
        <h1 id="headline" class="headline">Tytuł posta</h1>
        <p id="subheadline" class="subheadline">Podtytuł posta</p>
        <ul id="bodyPoints" class="body-points"></ul>
      </main>

      <div class="divider"></div>

      <!-- BOTTOMBAR -->
      <footer class="bottombar">
        <div class="logo">
          <img src="../assets/logo.svg" alt="Inspirio" class="white" />
          <span class="logo-text">Inspirio</span>
        </div>
        <span class="bottombar-cta">✦ link w bio 👆</span>
        <span id="date" class="bottombar-date">2026-04-05</span>
      </footer>

    </div>
  </body>
</html>
